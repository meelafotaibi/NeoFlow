name: NeoFlow CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Next.js Build
        run: npm run build

      - name: Compile and Test C++ Analytics Engine
        run: |
          g++ -O3 -std=c++17 -Icpp/include cpp/src/analytics_engine.cpp cpp/src/main.cpp -o analytics_engine
          ./analytics_engine
